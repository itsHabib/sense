# Sense SDK Project State
#
# Tracks completion status across all work streams.
# Read by /where-are-we to show current status and next steps.
#
# Status values: done | in_progress | next | pending
#   done        — fully shipped (code merged, tests pass)
#   in_progress — actively being built
#   next        — ready to start, no blockers
#   pending     — waiting on dependencies

project: sense
updated: 2026-03-22

tracks:
  core:
    description: "Core eval framework — Session, Eval, Compare, Assert, Require"
    status: done
    phases:
      api-design:           { status: done, notes: "Session-based, no globals" }
      eval-builder:         { status: done, notes: "Eval + EvalResult + Check types" }
      compare-builder:      { status: done, notes: "A/B comparison with criteria" }
      assert-require:       { status: done, notes: "t.Error / t.Fatal wrappers" }
      prompt-engineering:    { status: done, notes: "tool_use forced via ToolChoice" }
